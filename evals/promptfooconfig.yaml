description: Veda RAG evals — answer quality, behavior, model comparison

# Each provider runs the SAME RAG pipeline (evals/provider.py) with a different
# OpenRouter chat model, giving a side-by-side score / cost / latency table.
# Add or remove models here to run a bake-off.
providers:
  - id: file://provider.py
    label: deepseek-v4-flash
    config:
      model: deepseek/deepseek-v4-flash
  - id: file://provider.py
    label: glm-4.7-flash
    config:
      model: z-ai/glm-4.7-flash
  - id: file://provider.py
    label: deepseek-v4-pro
    config:
      model: deepseek/deepseek-v4-pro
  - id: file://provider.py
    label: glm-5.2
    config:
      model: z-ai/glm-5.2
  - id: file://provider.py
    label: gemini-3.5-flash
    config:
      model: google/gemini-3.5-flash
  - id: file://provider.py
    label: gpt-5.5
    config:
      model: openai/gpt-5.5
  - id: file://provider.py
    label: claude-opus-4.8
    config:
      model: anthropic/claude-opus-4.8

# The provider builds the RAG prompt itself, so the prompt here is just the question.
prompts:
  - "{{question}}"

# LLM-as-judge grader for `llm-rubric` assertions. Override the default (OpenAI)
# with an OpenRouter model so everything goes through one provider/key.
defaultTest:
  options:
    provider: openrouter:openai/gpt-4o-mini
  assert:
    # Global behavior guards applied to every case:
    - type: not-icontains
      value: "Great question"
    - type: javascript
      # Keep answers reasonably concise (system prompt targets <60 words).
      value: "output.trim().split(/\\s+/).length <= 90"

tests: file://dataset.yaml
